apiVersion: v1
kind: PersistentVolume # 종류 PV 사용

metadata:
  name: postgres-pv # postgres-pv 이름
spec:
  capacity:
    storage: 2Gi # 2기가 바이트
  accessModes:
    - ReadWriteOnce # ReadWriteOnce 한 노드에서 하나의 Pod만 읽기/쓰기
  storageClassName: standard
  hostPath:
    path: /data/db # 저장 공간을 물리적인 위치 지정 kind에 docker-container 내부

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pv-claim
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi # 최대 크기는 PV를 넘어갈 수 없다
  storageClassName: standard  

---

apiVersion: v1
kind: Service # 외부 혹은 클러스터의 접근을 위해 Service를 작성
metadata:
  name: postgres-svc # 라벨 - application.proerties -> configMap (postgres-host) -> spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}
spec:
  type: ClusterIP # 내부의 bookmarker-api를 통해서 접근 가능(외부접근 가능하도록 만들기 위해서 : NodePort / LoadBalancer를 사용해야) 을 하기 때문에
  selector:
    app: postgres-pod # Deployment의 selector : matchLabels: app : postgres-pod와 이름이 같아야 한다
  ports:
    - port: 5432 # 만약 service에서 5432를 포트포워딩 하면 내부로 접근이 가능하다
      targetPort: 5432


---

apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres-pod
 
  template:
    metadata:
      labels:
        app: postgres-pod

    spec:
      containers:
        - name: postgres
          image: postgres:14-alpine
          ports:
            - containerPort: 5432
          
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bookmark-secrets
                  key: postgres_password

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: bookmark-secrets
                  key: postgres_username

            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: bookmarker-config
                  key: postgres_dbname
          
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pv-claim



    
        
      