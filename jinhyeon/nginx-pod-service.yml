apiVersion: v1
kind: Pod
metadata:
  name: jh-nginx
  labels:
    app: nginx
spec:
  containers:
    - name: nginx
      image: nginx:latest
      ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  type: NodePort
  selector:
    app: nginx # pod의 label과 이름이 일치해야 한다(5번 6번줄)
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
      